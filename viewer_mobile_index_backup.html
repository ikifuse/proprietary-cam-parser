<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現場モニター (Anti-Gravity Dynamic Cockpit V5.0)</title>
    <!-- スマホでアイコン起動した時に「強制フルスクリーン・横画面」にするためのルールブック -->
    <link rel="manifest" href="/manifest.json">
    <!-- 🗺️ 動く地図システム（Leaflet）の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #111111;
            --accent: #00e5ff;
            --text-color: #ffffff;
            --success: #34c759;
            --warning: #ff9500;
        }
        body {
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: row; height: 100vh; overflow: hidden;
            touch-action: manipulation; /* 📱 ダブルタップズームによるクリック遅延を防止 */
        }
        
        /* 左サイドバー（コントロール ＆ 解析ステータス） */
        .sidebar {
            width: 300px; flex-shrink: 0;
            background: var(--panel-bg); border-right: 1px solid #333;
            display: flex; flex-direction: column; z-index: 20;
            padding: 20px; box-sizing: border-box;
            gap: 15px;
            overflow-y: auto; /* ★横画面で縦幅が足りない時でもスクロール可能に */
        }
        
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
 
        .section-title {
            font-size: 0.8em;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2px;
            font-weight: bold;
        }
 
        /* 3つの主要アクションボタン */
        .nav-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, #007aff, #005bb5);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .nav-btn.rear-active {
            background: linear-gradient(135deg, #ff3b30, #c01a11);
            box-shadow: 0 4px 10px rgba(255, 59, 48, 0.25);
        }
        .nav-btn.map-active {
            background: linear-gradient(135deg, #5856d6, #3b30b5);
            box-shadow: 0 4px 10px rgba(88, 86, 214, 0.25);
        }
        
        .export-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, var(--success), #248a3d);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(52, 199, 89, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .export-btn:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            border: 1px solid #333;
        }
 
        .select-btn {
            width: 100%;
            padding: 14px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            color: #fff;
            background: linear-gradient(135deg, #5856d6, #3b30b5);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(88, 86, 214, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .select-btn:hover, .export-btn:not(:disabled):hover, .nav-btn:hover {
            transform: translateY(-1px);
        }
 
        /* ローディングパネル */
        .loading-panel {
            background: #090909;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 15px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
        }
        
        .time-picker-module {
            background: #161616;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .time-input {
            background: #000;
            color: var(--accent);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px;
            font-family: monospace;
            font-size: 0.95em;
            color-scheme: dark;
            width: 100%;
            box-sizing: border-box;
        }
        .extract-btn {
            width: 100%;
            padding: 12px;
            font-size: 0.95em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            color: #000;
            background: linear-gradient(135deg, var(--accent), #0099aa);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .extract-btn:hover {
            transform: translateY(-1px);
        }
 
        /* 📱 指でスワイプスクロールできる時間指定リストボックス */
        .list-box-container {
            display: none;
            flex-direction: column;
            flex-grow: 1;
            min-height: 250px; /* ★スマホ横画面でもリスト領域が潰れないように確保 */
            overflow: hidden;
            border-top: 1px solid #222;
            padding-top: 15px;
        }
        .list-box {
            flex-grow: 1;
            overflow-y: auto;
            background: #090909;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 6px;
            box-sizing: border-box;
            -webkit-overflow-scrolling: touch;
        }
        /* スクロールバーの美化（暗めのサイバーデザイン） */
        .list-box::-webkit-scrollbar {
            width: 6px;
        }
        .list-box::-webkit-scrollbar-track {
            background: #090909;
        }
        .list-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
 
        /* 時間にスリム化された、タップしやすいリストアイテム */
        .list-item {
            padding: 14px 12px; 
            margin-bottom: 5px;
            background-color: #161616;
            border-radius: 6px;
            font-size: 0.95em;
            color: #aaa;
            cursor: pointer;
            border-left: 4px solid transparent;
            font-family: monospace;
            transition: 0.2s;
            white-space: nowrap;
        }
        .list-item.playing {
            border-left-color: var(--accent);
            color: #fff;
            background-color: #222;
            font-weight: bold;
            box-shadow: inset 0 0 8px rgba(0,229,255,0.1);
        }
        
        /* 保存用チェックボックスのデザイン */
        .save-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--success);
        }
        
        /* フォルダ選択モーダル */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            display: none; justify-content: center; align-items: center;
        }
        .folder-modal {
            background: #111; border: 1px solid #333; border-radius: 12px;
            width: 90%; max-width: 500px; max-height: 80vh;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        .modal-header {
            padding: 15px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-title { font-weight: bold; color: var(--accent); }
        .modal-close {
            background: none; border: none; color: #888; font-size: 1.5em; cursor: pointer; padding: 0 10px;
        }
        .modal-close:hover { color: #fff; }
        .current-path-display {
            padding: 10px 15px; background: #000; font-family: monospace;
            font-size: 0.85em; color: #aaa; word-break: break-all;
            border-bottom: 1px solid #222;
        }
        .folder-list {
            flex-grow: 1; overflow-y: auto; padding: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .folder-item {
            padding: 14px 12px; margin-bottom: 5px; background: #1a1a1a;
            border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.2s; font-size: 0.95em;
        }
        .folder-item:hover { background: #333; }
        .modal-footer {
            padding: 15px; border-top: 1px solid #333;
            display: flex; justify-content: flex-end; gap: 10px;
        }
        .btn-cancel {
            padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer;
        }
        .btn-confirm {
            padding: 10px 20px; background: linear-gradient(135deg, #007aff, #005bb5); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
 
        /* 右メインエリア（映像＆オーバーレイ） */
        .main-area {
            flex-grow: 1; position: relative; display: flex; flex-direction: column; background: #000;
        }
        .video-container {
            flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        video {
            width: 100%; height: 100%; max-height: 100vh; object-fit: contain; cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.5s, filter 0.3s;
        }

 
        /* 🗺️ 動く運行地図の表示エリア */
        #map {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #0d0d0d;
            z-index: 2;
        }
 
        /* プレースホルダー画面 */
        .video-placeholder {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            background: radial-gradient(circle, #111 0%, #000 100%);
            color: #666;
            font-family: monospace;
            text-align: center;
            gap: 15px;
        }
        .placeholder-icon {
            font-size: 4em;
            color: #333;
            animation: pulse 2s infinite alternate;
        }
 
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            100% { transform: scale(1.05); opacity: 0.8; }
        }
 
        /* 証拠数字バー（HUD風オーバーレイ上部） */
        .telemetry-bar {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 10;
            display: flex; justify-content: space-between; padding: 15px 40px; box-sizing: border-box;
            background: linear-gradient(rgba(0,0,0,0.9), transparent); font-family: monospace; font-size: 1.1em;
            pointer-events: none;
            opacity: 0;
            transition: 0.5s;
        }
        .telemetry-item { display: flex; flex-direction: column; align-items: center; text-shadow: 1px 1px 3px #000; }
        .telemetry-label { font-size: 0.6em; color: #ccc; letter-spacing: 1px; margin-bottom: 2px; }
        .val { color: var(--accent); font-weight: bold; font-size: 1.3em; }
 
        /* コントロールパネル（HUD風オーバーレイ下部） */
        .video-controls {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 10;
            background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 25px 40px; box-sizing: border-box;
            opacity: 0;
            transition: 0.5s;
        }
        .seek-container { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; font-family: monospace; text-shadow: 1px 1px 2px #000; }
        #seek-bar { flex-grow: 1; accent-color: var(--accent); height: 5px; cursor: pointer; }
        
        .playback-buttons { display: flex; gap: 10px; justify-content: center; align-items: center; }
        .playback-buttons button, .playback-buttons select {
            background: rgba(40,40,40,0.8); color: #fff; border: 1px solid #555; border-radius: 6px; 
            padding: 8px 18px; font-weight: bold; font-size: 0.9em; cursor: pointer; backdrop-filter: blur(4px);
            transition: 0.2s;
            white-space: nowrap;
        }
        .playback-buttons button:active { background: var(--accent); color: #000; }

 
        /* 📱 画面の高さが低い（Androidスマホの横向きなど）時に自動フィットさせる最高級レスポンシブ設定 */
        @media (max-height: 600px) {
            .sidebar {
                width: 250px;
                padding: 10px;
                gap: 8px;
            }
            .controls-group {
                gap: 8px;
            }
            .section-title {
                font-size: 0.7em;
            }
            .nav-btn, .export-btn, .select-btn {
                padding: 10px;
                font-size: 0.85em;
                border-radius: 6px;
            }
            .loading-panel {
                padding: 8px;
                gap: 5px;
            }
            .spinner {
                width: 18px; height: 18px;
            }
            .list-box-container {
                padding-top: 8px;
            }
            .list-box {
                padding: 4px;
            }
            .list-item {
                padding: 10px 8px;
                font-size: 0.85em;
                margin-bottom: 4px;
            }
            .telemetry-bar {
                padding: 8px 25px;
                font-size: 0.95em;
            }
            .video-controls {
                padding: 10px 25px 15px 25px;
            }
            .seek-container {
                margin-bottom: 4px;
                gap: 10px;
                font-size: 0.8em;
            }
            #seek-bar {
                height: 4px;
            }
            .playback-buttons {
                gap: 6px;
            }
            .playback-buttons button, .playback-buttons select {
                padding: 6px 12px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
 
    <!-- 左サイドバー -->
    <div class="sidebar">
        <!-- 3つのボタンコントロールグループ -->
        <div class="controls-group">
            <span class="section-title">Operations</span>
            
            <!-- ① カメラ切り替え (フロント ➔ リア ➔ 地図の3段ループトグル) -->
            <button id="btn-camera" class="nav-btn" onclick="rotateViewMode()">📸 フロント映像</button>
            
            <!-- ② SDカードへ保存 (最初は無効) -->
            <button id="btn-export" class="export-btn" onclick="exportToSD()" disabled>💾 チェックした動画を保存</button>
            
            <!-- ③ ファイル選択 (RAW塊を選ぶ) -->
            <!-- ④ 第3段階：時間指定スナイプ抽出モジュール -->
            <div id="time-picker-block" class="time-picker-module" style="margin-bottom: 20px;">
                <span class="section-title">🎯 スナイプ抽出（時間指定）</span>
                <div style="font-size: 0.85em; color: #aaa; margin-bottom: 8px;">
                    時間を指定して塊を選ぶと、該当時間だけを一撃で抜き出します。<br>
                    ※指定しない場合は、すべての映像をプレビューします。
                </div>
                <div>
                    <span style="font-size: 0.8em; color: #aaa;">開始:</span>
                    <input type="datetime-local" id="time-start" class="time-input" />
                </div>
                <div>
                    <span style="font-size: 0.8em; color: #aaa;">終了:</span>
                    <input type="datetime-local" id="time-end" class="time-input" />
                </div>
            </div>

            <button id="btn-select" class="select-btn" onclick="runSelectAnimation()">📁 抽出元(RAW)を選択してスナイプ</button>
        </div>

 
        <!-- 中間のローディングアニメーション -->
        <div id="loading-panel" class="loading-panel">
            <div class="spinner"></div>
            <div id="loading-msg" style="font-size: 0.8em; color: var(--accent); font-family: monospace;">塊データを解析中...</div>
        </div>
 
        <!-- 動的に出現する、指でスクロール可能な時間指定リストボックス -->
        <div id="list-box-container" class="list-box-container">
            <span class="section-title">Playlist (時間指定)</span>
            <div id="playlist-container" class="list-box">
                <!-- ここにスリム化された運行時間ボタンが動的に生成されます -->
            </div>
        </div>
    </div>
 
    <!-- 右メインエリア -->
    <div class="main-area">
        <!-- プレースホルダー画面 -->
        <div id="placeholder" class="video-placeholder">
            <span class="placeholder-icon">🚖</span>
            <div style="font-size: 1.2em; font-weight: bold; color: #888;">現場モニター ENGINE ACTIVE</div>
            <div style="font-size: 0.9em; color: #555; max-width: 400px; line-height: 1.6;">
                SDカードの塊ファイル（0KBフォルダ）を指定して、映像ファイルをスキャン・再生してください。
            </div>
        </div>
 
        <div class="video-container" style="width: 100%; height: 100%; position: relative;">
            
            <!-- 🗺️ 動く運行地図 (通常は非表示、3ステップトグルでアクティブ化) -->
            <div id="map"></div>
 

 
            <!-- HUD上部 -->
            <div id="hud-top" class="telemetry-bar">
                <div class="telemetry-item">
                    <span class="telemetry-label">TIME</span>
                    <span class="val" id="disp-time">--:--:--</span>
                </div>
                <div class="telemetry-item">
                    <span class="telemetry-label">SPEED</span>
                    <span><span class="val" id="disp-speed">0</span> km/h</span>
                </div>
                <div class="telemetry-item">
                    <span class="telemetry-label">GPS (LAT, LON)</span>
                    <span class="val" id="disp-gps">---.---, ---.---</span>
                </div>
            </div>
 
            <video id="player" playsinline autoplay></video>
 
            <!-- HUD下部 -->
            <div id="hud-bottom" class="video-controls">
                <div class="seek-container">
                    <span id="curr-time">0:00</span>
                    <input type="range" id="seek-bar" value="0" step="0.1">
                    <span id="total-time">0:00</span>
                </div>
                <div class="playback-buttons">

                    
                    <select id="speed-select" onchange="changeSpeed(this.value)">
                        <option value="1.0">1.0x (標準)</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                        <option value="1.75">1.75x</option>
                        <option value="2.0">2.0x</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <!-- フォルダ選択モーダル -->
    <div id="folder-modal-overlay" class="modal-overlay">
        <div class="folder-modal">
            <div class="modal-header">
                <span class="modal-title">📁 フォルダを選択</span>
                <button class="modal-close" onclick="closeFolderModal()">×</button>
            </div>
            <div id="current-path-display" class="current-path-display">/</div>
            <div id="folder-list" class="folder-list">
                <!-- フォルダ一覧がここに入ります -->
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeFolderModal()">キャンセル</button>
                <button class="btn-confirm" onclick="confirmFolderSelection()">このフォルダを開く</button>
            </div>
        </div>
    </div>

    <script>
        let currentFiles = [];
        let currentIndex = -1;
        let currentCamera = 'front';
        let currentMode = 'front'; // 'front', 'rear', 'map'
        let telemetryData = [];
        let isTransitioning = false;
        let targetTime = -1;
        let currentSpeed = 1.0;
        let isSelectDone = false;
        let clickTimeout = null;
        
        // 地図オブジェクト
        let map = null;
        let carMarker = null;
        
        const player = document.getElementById('player');
        const seekBar = document.getElementById('seek-bar');
        const currTimeDisp = document.getElementById('curr-time');
        const totalTimeDisp = document.getElementById('total-time');
        
        const btnCamera = document.getElementById('btn-camera');
        const btnExport = document.getElementById('btn-export');
        const btnSelect = document.getElementById('btn-select');
        const speedSelect = document.getElementById('speed-select');
        
        const loadingPanel = document.getElementById('loading-panel');
        const listBoxContainer = document.getElementById('list-box-container');
        const playlistContainer = document.getElementById('playlist-container');
        
        const placeholder = document.getElementById('placeholder');
        const hudTop = document.getElementById('hud-top');
        const hudBottom = document.getElementById('hud-bottom');
        const mapDiv = document.getElementById('map');
        const videoContainer = document.querySelector('.video-container');
 
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
 
        // 🗺️ 地図 (Leaflet + OpenStreetMap) の初期化
        function initMap() {
            if (map) return;
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            });
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // クールな光る防犯カメラアイコンピン
            const carIcon = L.divIcon({
                html: '<div style="font-size: 28px; filter: drop-shadow(0 0 8px var(--accent));">🚖</div>',
                className: 'custom-div-icon',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
            
            carMarker = L.marker([35.6895, 139.6917], { icon: carIcon }).addTo(map);
        }
 
        // GPS座標のNMEA表記（度分: DDMM.MMMM）を十進法（度数）に極上デコードする関数
        function parseNmeaCoords(coord_str, is_lon = false) {
            const val = parseFloat(coord_str);
            if (isNaN(val) || val === 0) return 0;
            const deg_len = is_lon ? 3 : 2;
            const deg = Math.floor(val / 100);
            const min_val = val - (deg * 100);
            return deg + (min_val / 60);
        }
 
        // 📸 フロント ➔ 🎥 リア ➔ 🗺️ 地図の3段ループ切替トグル！
        function rotateViewMode() {
            const prevCamera = currentCamera;
            
            if (currentMode === 'front') {
                // フロントからリアへ
                currentMode = 'rear';
                currentCamera = 'rear';
                btnCamera.className = 'nav-btn rear-active';
                btnCamera.innerText = '🎥 リア映像';
                mapDiv.style.display = 'none';
                player.style.display = 'block';
            } else if (currentMode === 'rear') {
                // リアから地図へ
                currentMode = 'map';
                btnCamera.className = 'nav-btn map-active';
                btnCamera.innerText = '🗺️ 運行地図 (GPS)';
                player.style.display = 'none';
                mapDiv.style.display = 'block';
                
                // 地図の初期化を遅延実行（表示されてからサイズ計算させるため）
                setTimeout(() => {
                    initMap();
                    map.invalidateSize();
                }, 100);
            } else {
                // 地図からフロントへ
                currentMode = 'front';
                currentCamera = 'front';
                btnCamera.className = 'nav-btn front-active';
                btnCamera.innerText = '📸 フロント映像';
                mapDiv.style.display = 'none';
                player.style.display = 'block';
            }
            
            // 再生中の動画ソースを切り替え
            if (currentIndex >= 0 && currentMode !== 'map') {
                const cTime = player.currentTime;
                const wasPlaying = !player.paused; // 今再生中かどうかを記憶しておく
                player.src = `/stream/${currentFiles[currentIndex]}?camera=${currentCamera}`;
                player.currentTime = cTime;
                if (wasPlaying) player.play().catch(e => console.log(e));
            }
        }

        let currentBrowserPath = "";

        async function openFolderModal(targetPath = "") {
            const overlay = document.getElementById('folder-modal-overlay');
            overlay.style.display = 'flex';
            
            try {
                const res = await fetch(`/api/list_dirs?path=${encodeURIComponent(targetPath)}`);
                const data = await res.json();
                
                if (data.error) {
                    alert("フォルダの読み込みに失敗しました: " + data.error);
                    return;
                }
                
                currentBrowserPath = data.current_path;
                document.getElementById('current-path-display').innerText = currentBrowserPath;
                
                const listContainer = document.getElementById('folder-list');
                listContainer.innerHTML = '';
                
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'folder-item';
                    div.innerHTML = `<span style="font-size: 1.2em;">📁</span> <span>${item.name}</span>`;
                    div.onclick = () => {
                        openFolderModal(item.path);
                    };
                    listContainer.appendChild(div);
                });
            } catch (e) {
                console.error(e);
            }
        }
        
        function closeFolderModal() {
            document.getElementById('folder-modal-overlay').style.display = 'none';
        }
        
        async function confirmFolderSelection() {
            closeFolderModal();
            const btnSelect = document.getElementById('btn-select');
            const loadingPanel = document.getElementById('loading-panel');
            const placeholder = document.getElementById('placeholder');
            const hudTop = document.getElementById('hud-top');
            const hudBottom = document.getElementById('hud-bottom');
            
            const startInput = document.getElementById('time-start').value;
            const endInput = document.getElementById('time-end').value;
            
            if (startInput && endInput) {
                // スナイプモード（抽出）
                await doSnipeExtraction(startInput, endInput, loadingPanel, placeholder, hudTop, hudBottom);
            } else {
                // プレビューモード（全リスト表示）
                await doPreviewMode(loadingPanel, placeholder, hudTop, hudBottom);
            }
        }
        
        async function doPreviewMode(loadingPanel, placeholder, hudTop, hudBottom) {
            document.getElementById('loading-msg').innerText = "塊データを解析中... (最大1分)";
            loadingPanel.style.display = 'flex';
            
            try {
                const res = await fetch('/api/set_folder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentBrowserPath })
                });
                
                const data = await res.json();
                if (!data.success) {
                    loadingPanel.style.display = 'none';
                    alert("フォルダの設定に失敗しました: " + data.error);
                    return;
                }
                
                loadingPanel.style.display = 'none';
                placeholder.style.display = 'none';
                player.style.opacity = '1';
                hudTop.style.opacity = '1';
                hudBottom.style.opacity = '1';
                isSelectDone = true;
                
                listBoxContainer.style.display = 'flex';
                loadPlaylist();
            } catch(e) {
                loadingPanel.style.display = 'none';
                console.error(e);
            }
        }
        
        async function doSnipeExtraction(startInput, endInput, loadingPanel, placeholder, hudTop, hudBottom) {
            const startTimeStr = startInput.replace(/[-T:]/g, "") + "00";
            const endTimeStr = endInput.replace(/[-T:]/g, "") + "00";
            
            document.getElementById('loading-msg').innerText = "塊からスナイプ抽出中... (超高速)";
            loadingPanel.style.display = 'flex';
            
            try {
                const res = await fetch('/api/extract_by_time', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        raw_path: currentBrowserPath,
                        start_time: startTimeStr,
                        end_time: endTimeStr
                    })
                });
                
                const data = await res.json();
                loadingPanel.style.display = 'none';
                
                if (!data.success) {
                    alert("抽出に失敗しました: " + data.error);
                    return;
                }
                
                alert(`スナイプ抽出完了！\n${data.extracted} 個の動画データを一撃で抜き出しました。`);
                
                placeholder.style.display = 'none';
                player.style.opacity = '1';
                hudTop.style.opacity = '1';
                hudBottom.style.opacity = '1';
                isSelectDone = true;
                
                listBoxContainer.style.display = 'flex';
                loadPlaylist();
            } catch(e) {
                loadingPanel.style.display = 'none';
                console.error(e);
                alert("エラーが発生しました: " + e);
            }
        }

        function runSelectAnimation() {

            // フルスクリーン化されている場合、ボタンタップのタイミングで横画面ロックを再試行（確実化）
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log(e));
            }
            
            const btnSelect = document.getElementById('btn-select');
            btnSelect.style.transform = 'scale(0.95)';
            setTimeout(async () => {
                btnSelect.style.transform = 'scale(1)';
                openFolderModal(""); // 空文字を渡してデフォルトパスから開始
            }, 200);
        }



        // ファイル名を表示リストにそのまま表示！
        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            currentFiles.forEach((filename, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.id = 'item-' + index;
                
                // 「.dat」を取り除いたスッキリした名前
                const cleanName = filename.replace('.dat', '');
                
                div.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="chk-${index}" class="save-checkbox" onclick="event.stopPropagation()">
                        <span style="margin-left: 10px;">📼 ${cleanName}</span>
                    </div>
                `;
                
                div.onclick = () => playVideo(index);
                playlistContainer.appendChild(div);
            });
        }               

 
        async function loadPlaylist() {
            try {
                const response = await fetch('/api/videos');
                const data = await response.json();
                if (data.videos && data.videos.length > 0) {
                    // 若い順（古い日付・時間が上に来るように昇順ソート）
                    currentFiles = data.videos.sort(); 
                    renderPlaylist();
                    document.getElementById('btn-export').disabled = false; // データを読み込んだら保存ボタンを有効化
                    playVideo(0); 
                } else {
                    currentFiles = [];
                    renderPlaylist();
                }
            } catch (e) {}
        }
 

 
        async function fetchTelemetry(filename) {
            try {
                const res = await fetch(`/api/telemetry?file=${encodeURIComponent(filename)}`);
                telemetryData = await res.json();
            } catch (e) { telemetryData = []; }
        }
 
        // アプリ起動時に強制的に横画面をロックするフォールバック + 開始時間と終了時間のスマート連動
        document.addEventListener('DOMContentLoaded', () => {
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log('Orientation lock failed or not supported:', e));
            }
            
            // 開始時間をセットしたら終了時間を自動的に「開始時間の5分後」に仮セットしてダイアルの初期位置を同期させる
            const startTimeInput = document.getElementById('time-start');
            const endTimeInput = document.getElementById('time-end');
            
            if (startTimeInput && endTimeInput) {
                startTimeInput.addEventListener('change', (e) => {
                    const startVal = e.target.value;
                    if (startVal) {
                        // 開始時間の5分後を計算
                        const startDate = new Date(startVal);
                        startDate.setMinutes(startDate.getMinutes() + 5);
                        
                        // YYYY-MM-DDTHH:mm フォーマットに手動変換 (タイムゾーンのズレを防ぐためローカル処理)
                        const yyyy = startDate.getFullYear();
                        const mm = String(startDate.getMonth() + 1).padStart(2, '0');
                        const dd = String(startDate.getDate()).padStart(2, '0');
                        const hh = String(startDate.getHours()).padStart(2, '0');
                        const min = String(startDate.getMinutes()).padStart(2, '0');
                        
                        endTimeInput.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;
                    }
                });
            }
        });

        function playVideo(index, keepTime = false) {
            if (index < 0 || index >= currentFiles.length) return;
            isTransitioning = false;
            
            if (currentIndex >= 0) {
                document.getElementById('item-' + currentIndex)?.classList.remove('playing');
            }
            currentIndex = index;
            const activeItem = document.getElementById('item-' + currentIndex);
            if (activeItem) {
                activeItem.classList.add('playing');
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
 
            const filename = currentFiles[index];
            const currentTime = keepTime ? player.currentTime : 0;
            targetTime = keepTime ? currentTime : -1;
            
            if (!keepTime) fetchTelemetry(filename);
            
            player.style.opacity = "0.5";
            player.src = `/stream/${encodeURIComponent(filename)}?camera=${currentCamera}`;
            player.playbackRate = currentSpeed;
            player.play().catch(e => console.log(e));
        }
 
        setInterval(() => {
            if (targetTime >= 0 && player.readyState >= 1) {
                player.currentTime = targetTime;
                player.style.opacity = "1";
                targetTime = -1;
            }
        }, 50);
 
        // 💾 SDカードへ保存 (チェックされた動画を結合してダウンロード保存)
        async function exportToSD() {
            const checkboxes = document.querySelectorAll('.save-checkbox');
            const selectedIndexes = [];
            
            checkboxes.forEach((chk, idx) => {
                if (chk.checked) selectedIndexes.push(idx);
            });
            
            if (selectedIndexes.length === 0) {
                alert("保存したい動画のチェックボックスにチェックを入れてください。");
                return;
            }
            
            // 連続チェックのバリデーション
            selectedIndexes.sort((a, b) => a - b);
            let isContinuous = true;
            for (let i = 1; i < selectedIndexes.length; i++) {
                if (selectedIndexes[i] - selectedIndexes[i-1] !== 1) {
                    isContinuous = false;
                    break;
                }
            }
            if (!isContinuous) {
                alert("保存するファイルは連続した時間（チェックが連続）である必要があります。\nチェックが抜けている箇所がないか確認してください。");
                return;
            }
            
            // 出力ファイル名の生成
            const firstFile = currentFiles[selectedIndexes[0]].replace('.dat', '');
            const lastFile = currentFiles[selectedIndexes[selectedIndexes.length - 1]].replace('.dat', '');
            
            let out_filename = "";
            if (selectedIndexes.length === 1) {
                out_filename = `${firstFile}_${currentCamera}.mp4`;
            } else {
                const firstParts = firstFile.split('_');
                const lastParts = lastFile.split('_');
                
                // 例: 20250903_032839
                const startDate = firstParts[0];
                const startTime = firstParts[1] || "";
                const endTime = lastParts[1] || "";
                
                out_filename = `${startDate}_${startTime}-${endTime}_${currentCamera}.mp4`;
            }
            
            // 結合するファイルのリストを作成
            const filesToMerge = selectedIndexes.map(idx => currentFiles[idx]);
            
            // ==========================================
            // 🗺️ 地図モードの場合は「ルートデータ(KML/CSV)」として出力
            // ==========================================
            if (currentMode === 'map') {
                const format = prompt("ルートデータを保存します。\n保存形式を「kml」または「csv」で入力してください。", "kml");
                if (format === null) return; // キャンセルされた場合
                const ext = format.toLowerCase().trim() === 'csv' ? 'csv' : 'kml';
                
                // ファイル名の再設定 (動画用の_frontなどを外す)
                let route_filename = "";
                if (selectedIndexes.length === 1) {
                    route_filename = `${firstFile}.${ext}`;
                } else {
                    const firstParts = firstFile.split('_');
                    const lastParts = lastFile.split('_');
                    route_filename = `${firstParts[0]}_${firstParts[1] || ""}-${lastParts[1] || ""}.${ext}`;
                }
                
                const loadingPanel = document.getElementById('loading-panel');
                document.getElementById('loading-msg').innerText = "ルートデータを生成中... しばらくお待ちください";
                loadingPanel.style.display = 'flex';
                
                try {
                    let allPoints = [];
                    // 順番にGPSデータを取得して結合
                    for (let filename of filesToMerge) {
                        const res = await fetch(`/api/telemetry?file=${encodeURIComponent(filename)}`);
                        const data = await res.json();
                        // 座標データが存在するものだけを抽出
                        const validPoints = data.filter(p => p.lat && p.lon && p.lat !== "" && p.lon !== "");
                        allPoints.push(...validPoints);
                    }
                    
                    let fileContent = "";
                    if (ext === 'csv') {
                        // CSV形式の生成 (Googleマイマップでインポート可能)
                        fileContent = "Time,Latitude,Longitude,Speed(km/h)\n";
                        allPoints.forEach(p => {
                            const decLat = parseNmeaCoords(p.lat, false);
                            const decLon = parseNmeaCoords(p.lon, true);
                            fileContent += `${p.time},${decLat.toFixed(6)},${decLon.toFixed(6)},${p.speed}\n`;
                        });
                    } else {
                        // KML形式の生成 (ルートを線として描画するのに最適)
                        let coordsText = "";
                        allPoints.forEach(p => {
                            const decLat = parseNmeaCoords(p.lat, false);
                            const decLon = parseNmeaCoords(p.lon, true);
                            coordsText += `${decLon.toFixed(6)},${decLat.toFixed(6)},0\n`;
                        });
                        
                        fileContent = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
  <Document>
    <name>${route_filename}</name>
    <Style id="routeStyle">
      <LineStyle>
        <color>ff0000ff</color> <!-- 赤色の線 -->
        <width>5</width>
      </LineStyle>
    </Style>
    <Placemark>
      <name>走行ルート</name>
      <styleUrl>#routeStyle</styleUrl>
      <LineString>
        <tessellate>1</tessellate>
        <coordinates>
${coordsText}
        </coordinates>
      </LineString>
    </Placemark>
  </Document>
</kml>`;
                    }
                    
                    loadingPanel.style.display = 'none';
                    
                    // ブラウザ上でテキストファイルを生成してダウンロード
                    const blob = new Blob([fileContent], { type: ext === 'csv' ? 'text/csv' : 'application/vnd.google-earth.kml+xml' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = route_filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                } catch (error) {
                    loadingPanel.style.display = 'none';
                    alert("ルートデータの生成中にエラーが発生しました。");
                    console.error(error);
                }
                
                return; // ここで処理を終了し、動画の保存処理には進まない
            }
            
            // ==========================================
            // 🎥 フロント/リアモードの場合は「動画」として出力
            // ==========================================
            // ローディング画面の表示
            const loadingPanel = document.getElementById('loading-panel');
            document.getElementById('loading-msg').innerText = "ファイルを結合中... しばらくお待ちください";
            loadingPanel.style.display = 'flex';
            
            try {
                const response = await fetch('/api/export_merged', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        files: filesToMerge,
                        camera: currentCamera,
                        out_filename: out_filename
                    })
                });
                
                const data = await response.json();
                loadingPanel.style.display = 'none'; // ロード画面を隠す
                
                if (data.success) {
                    // ダウンロードを実行
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.download = out_filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    alert("ファイルの結合中にエラーが発生しました: " + data.error);
                }
            } catch (error) {
                loadingPanel.style.display = 'none';
                alert("サーバーとの通信に失敗しました。");
                console.error(error);
            }
        }
        
        function seekVideo(seconds) {
            let newTime = player.currentTime + seconds;
            if (newTime < 0) newTime = 0;
            if (newTime > player.duration) newTime = player.duration;
            player.currentTime = newTime;
        }
 
        function changeSpeed(speed) {
            currentSpeed = parseFloat(speed);
            player.playbackRate = currentSpeed;
        }
 

 
        // 📱 YouTube風 ダブルタップ/ダブルクリックジェスチャー操作の実装！
        videoContainer.addEventListener('click', (e) => {
            // HUD下部、HUD上部、サイドバー、地図、またはプレースホルダー上でのタップはダブルタップ処理を無視する
            if (e.target.closest('#hud-bottom') || 
                e.target.closest('#hud-top') || 
                e.target.closest('.sidebar') || 
                e.target.closest('#map') || 
                e.target.closest('#placeholder')) {
                return;
            }
            
            const rect = videoContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const isRightSide = clickX > (rect.width / 2);
            
            if (clickTimeout) {
                // 【ダブルタップ検知！】
                clearTimeout(clickTimeout);
                clickTimeout = null;
                
                if (isRightSide) {
                    seekVideo(5);
                    showRipple("▶▶ 5秒進む");
                } else {
                    seekVideo(-5);
                    showRipple("◀◀ 5秒戻る");
                }
            } else {
                // シングルタップ待機
                clickTimeout = setTimeout(() => {
                    clickTimeout = null;
                    if (isSelectDone) {
                        if (player.paused) player.play();
                        else player.pause();
                    }
                }, 220);
            }
        });
 
        // タップ時に画面中央に浮かび上がるサイバーなインジケーター（Ripple）の演出
        function showRipple(text) {
            const ripple = document.createElement('div');
            ripple.innerText = text;
            ripple.style.position = 'absolute';
            ripple.style.top = '50%';
            ripple.style.left = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.background = 'rgba(0,0,0,0.85)';
            ripple.style.color = 'var(--accent)';
            ripple.style.border = '1px solid var(--accent)';
            ripple.style.padding = '12px 24px';
            ripple.style.borderRadius = '20px';
            ripple.style.fontFamily = 'monospace';
            ripple.style.fontSize = '1.3em';
            ripple.style.fontWeight = 'bold';
            ripple.style.zIndex = '999';
            ripple.style.pointerEvents = 'none';
            ripple.style.boxShadow = '0 0 15px var(--accent)';
            ripple.style.transition = 'opacity 0.4s, transform 0.4s';
            
            videoContainer.appendChild(ripple);
            
            setTimeout(() => {
                ripple.style.opacity = '0';
                ripple.style.transform = 'translate(-50%, -50%) scale(1.2)';
                setTimeout(() => ripple.remove(), 400);
            }, 250);
        }
 
        seekBar.addEventListener('input', () => { player.currentTime = seekBar.value; });
 
        player.ontimeupdate = () => {
            const t = player.currentTime;
            
            if (player.duration) {
                seekBar.max = player.duration;
                seekBar.value = t;
                currTimeDisp.innerText = formatTime(t);
                totalTimeDisp.innerText = formatTime(player.duration);
            }
            
            if (player.duration > 0 && player.duration - t < 0.5) {
                if (!isTransitioning && currentIndex + 1 < currentFiles.length) {
                    isTransitioning = true;
                    setTimeout(() => { playVideo(currentIndex + 1); }, 100);
                }
            }
 
            if (!telemetryData || telemetryData.length === 0) return;
            
            let closest = telemetryData[0];
            for (let i = 0; i < telemetryData.length; i++) {
                if (telemetryData[i].offset <= t) closest = telemetryData[i];
                else break;
            }
            
            if (closest) {
                document.getElementById('disp-time').innerText = closest.time;
                document.getElementById('disp-speed').innerText = closest.speed;
                
                // 📡 NMEA度分（DDMM.MMMM）を十進数（度）に極上デコードしてHUDに表示！
                const latDec = parseNmeaCoords(closest.lat, false);
                const lonDec = parseNmeaCoords(closest.lon, true);
                if (latDec !== 0 && lonDec !== 0) {
                    document.getElementById('disp-gps').innerText = latDec.toFixed(5) + ", " + lonDec.toFixed(5);
                } else {
                    document.getElementById('disp-gps').innerText = "---.---, ---.---";
                }
                
                // 🗺️ 現在地が地図モードなら、 Leaflet 上の防犯カメラピンを滑らかに移動追従させる！
                if (currentMode === 'map' && latDec !== 0 && lonDec !== 0) {
                    const newPos = [latDec, lonDec];
                    if (carMarker) carMarker.setLatLng(newPos);
                    if (map) map.setView(newPos, 16);
                }
            }
        };
 
        player.addEventListener('loadeddata', () => { player.style.opacity = "1"; });
    </script>
